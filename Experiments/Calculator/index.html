<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Simple Calculator</title>
    <style>
        :root{ --bg:#000; --panel:#0b0b0b; --button:#1f1f1f; --button-dark:#111; --accent:#78c24a; --op:#9bdc74; --text:#fff }
        html,body{height:100%;margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;color:var(--text)}
        .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:18px}
        .calculator{width:360px;max-width:96vw;background:transparent}
        .screen{height:140px;padding:18px 16px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;color:var(--text)}
        #display{font-size:48px;line-height:1;word-break:break-all}
        .buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:12px}
        .button{background:var(--button);color:var(--text);border-radius:50%;height:72px;display:flex;align-items:center;justify-content:center;font-size:22px;user-select:none;cursor:pointer;box-shadow:inset 0 -6px rgba(0,0,0,0.4)}
        .button.op{color:var(--op);background:transparent}
        .button.clear{color:#ff7b7b}
        .button.equals{background:var(--accent);color:#fff}
        .button.wide{grid-column:span 2;border-radius:36px;height:72px}
        @media (max-width:420px){.button{height:64px;font-size:20px}}
    </style>
</head>
<body>
    <div class='wrap'>
        <div class='calculator'>
            <div class='screen'></div>
            <div class='buttons'>
                <div class='button clear'>C</div>
                <div class='button op'>()</div>
                <div class='button op'>%</div>
                <div class='button op'>&divide;</div>
                <div class='button'>7</div>
                <div class='button'>8</div>
                <div class='button'>9</div>
                <div class='button op'>&times;</div>
                <div class='button'>4</div>
                <div class='button'>5</div>
                <div class='button'>6</div>
                <div class='button op'>-</div>
                <div class='button'>1</div>
                <div class='button'>2</div>
                <div class='button'>3</div>
                <div class='button op'>+</div>
                <div class='button'>+/-</div>
                <div class='button'>0</div>
                <div class='button'>.</div>
                <div class='button equals wide'>=</div>
            </div>
        </div>
    </div>
    <script>
        (function(){
            const screen = document.querySelector('.screen');
            let display = document.getElementById('display');
            if (!display) {
                display = document.createElement('div');
                display.id = 'display';
                screen.appendChild(display);
            }
            display.textContent = '0';

            const buttons = Array.from(document.querySelectorAll('.button'));
            let expr = '';

            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const v = btn.textContent.trim();

                    if (v === 'C') {
                        expr = '';
                        display.textContent = '0';
                        return;
                    }

                    if (v === '=') {
                        if (!expr) return;
                        try {
                            const safeExpr = expr.replace(/x/g, '*').replace(/×/g, '*').replace(/÷/g, '/').replace(/%/g, '/100');
                            const result = Function('return ' + safeExpr)();
                            display.textContent = String(result);
                            expr = String(result);
                        } catch (e) {
                            display.textContent = 'Error';
                            expr = '';
                        }
                        return;
                    }
                    if (v === '+/-') {
                        if (!expr) return;
                        if (expr[0] === '-') expr = expr.slice(1);
                        else expr = '-' + expr;
                        display.textContent = expr;
                        return;
                    }
                    if (v === '()') {
                        const opens = (expr.match(/\(/g) || []).length;
                        const closes = (expr.match(/\)/g) || []).length;
                        expr += opens > closes ? ')' : '(';
                        display.textContent = expr || '0';
                        return;
                    }
                    const mapped = v === 'x' ? '*' : (v === '÷' ? '/' : v);
                    expr += mapped;
                    display.textContent = expr || '0';
                });
            });
        })();
    </script>
</body>
</html>
