<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Calculator Upgrade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class='wrap' id="app" data-theme="dark">
        <div class='calculator'>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle theme" title="Toggle theme">◐</button>
            <div class='screen'>
                <div class="meta-row"><span id="memoryStatus">M: 0</span><span id="errorStatus"></span></div>
            </div>
            <div class='buttons' id="keypad">
                <div class='button op mem' data-action="mc">MC</div>
                <div class='button op mem' data-action="mr">MR</div>
                <div class='button op mem' data-action="mplus">M+</div>
                <div class='button op mem' data-action="mminus">M-</div>
                <div class='button clear' data-action="clear">C</div>
                <div class='button op' data-action="paren">()</div>
                <div class='button op' data-value="%">%</div>
                <div class='button op' data-value="/">&divide;</div>
                <div class='button' data-value="7">7</div>
                <div class='button' data-value="8">8</div>
                <div class='button' data-value="9">9</div>
                <div class='button op' data-value="*">&times;</div>
                <div class='button' data-value="4">4</div>
                <div class='button' data-value="5">5</div>
                <div class='button' data-value="6">6</div>
                <div class='button op' data-value="-">-</div>
                <div class='button' data-value="1">1</div>
                <div class='button' data-value="2">2</div>
                <div class='button' data-value="3">3</div>
                <div class='button op' data-value="+">+</div>
                <div class='button' data-action="sign">+/-</div>
                <div class='button' data-value="0">0</div>
                <div class='button' data-value=".">.</div>
                <div class='button equals wide' data-action="equals">=</div>
            </div>
        </div>
        <div class="history-panel">
            <div class="history-head">
                <h2>History</h2>
                <button type="button" id="clearHistory" class="history-clear">Clear</button>
            </div>
            <ul id="historyList"></ul>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
