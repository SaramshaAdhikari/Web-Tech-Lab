<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saramsha - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">Saramsha<span>.</span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>
    <section class="hero">
        <div class="container text-center">
            <h1>Contact</h1>
            <p>Send me a message.</p>
        </div>
    </section>
    <section class="section">
        <div class="container contact-layout">
            <div class="contact-main">
                <h2>Message</h2>
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject">
                            <option value="general">General</option>
                            <option value="collaboration">Collaboration</option>
                            <option value="feedback">Feedback</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send</button>
                    <button type="reset" class="btn btn-secondary">Clear</button>
                </form>
            </div>

            <div class="contact-sidebar">
                <h2>Info</h2>
                <div class="card">
                    <p><strong>Email</strong><br><a href="mailto:saramsha@example.com">saramsha@example.com</a></p>
                    <p><strong>GitHub</strong><br><a href="https://github.com/" target="_blank">github.com/saramsha</a></p>
                    <p><strong>LinkedIn</strong><br><a href="https://linkedin.com/" target="_blank">linkedin.com/in/saramsha</a></p>
                </div>
                <div class="card" style="margin-top: 14px;">
                    <h3>Location</h3>
                    <address>Saramsha<br>Web Technology Student<br>Available Online</address>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="container">
            <p>Saramsha &bull; AI/ML &bull; Astronomy &bull; Health</p>
        </div>
    </footer>
</body>
</html>
